<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
    <meta name="description" content="{{ page_description or '' }}">
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; min-height: 100%; background: #f5ebe9; }
        body { font-family: Arial, sans-serif; }
        .figma-page {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            background: #f5ebe9;
        }
        .figma-page picture,
        .figma-page img {
            display: block;
            width: min(100%, 1600px);
            height: auto;
        }
        .figma-page img {
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.02);
        }
        @media (max-width: 520px) {
            .figma-page picture,
            .figma-page img {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="figma-page">
        <picture>
            {% if mobile_image %}
            <source media="(max-width: 520px)" srcset="{{ url_for('static', filename=mobile_image) }}">
            {% endif %}
            <img src="{{ url_for('static', filename=desktop_image) }}" alt="{{ page_title }}">
        </picture>
    </main>
</body>
</html>
